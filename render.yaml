services:
  - type: web
    name: holding-radar-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run prisma:deploy && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: BRAPI_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_ENABLE_WEB_SEARCH
        value: "false"
      - key: CORS_ORIGIN
        sync: false
      - key: BRAPI_BATCH_SIZE
        value: "10"
      - key: CACHE_QUOTES_MINUTES
        value: "15"
      - key: CACHE_FUNDAMENTALS_HOURS
        value: "24"
      - key: CACHE_DIVIDENDS_HOURS
        value: "24"
      - key: SCANNER_CACHE_MINUTES
        value: "15"
      - key: MAX_CONCURRENT_REQUESTS
        value: "3"
